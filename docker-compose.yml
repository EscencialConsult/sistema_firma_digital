services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: firma_digital
      POSTGRES_USER: firma
      POSTGRES_PASSWORD: firma
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firma -d firma_digital"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./web-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://firma:firma@postgres:5432/firma_digital
      JWT_ACCESS_SECRET: change_me_access_secret_at_least_32_chars
      JWT_REFRESH_SECRET: change_me_refresh_secret_at_least_32_chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      UPLOADS_DIR: uploads
      MAX_FILE_SIZE_MB: 10
      IDENTITY_UPLOAD_DIR: uploads/identity
      IDENTITY_EXPIRES_DAYS: 365
      APP_URL: http://localhost:5173
      API_URL: http://localhost:4000
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123456
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

  frontend:
    build:
      context: ./web-portal
      args:
        VITE_API_URL: http://localhost:4000/api
        VITE_APP_NAME: Firma Digital Portal
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
